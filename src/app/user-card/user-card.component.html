<div class="card">
  <div class="profile-pic">
    <div class="circle">
      <img [src]="User.profileImage" alt="">
    </div>
  </div>
  <p>{{User.userName}}</p>
    <p>{{User.email}}</p>
    <p>{{User.phone}}</p>
    <span ><i [ngClass]="User.verified ? 'green' : 'red'" class="fa-solid fa-star"></i></span>
</div>
