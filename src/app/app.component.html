<div class="container">
    <h1>Users</h1>
    <div class="search">
      <input type="email"placeholder="email" [(ngModel)]="searchEmail">
      <button (click)="filterEmail()">Search</button>
    </div>
    <div class="cards-container">
      @for (user of fileredEmail; track $index) {
        <app-user-card [User]="user" />
      }
    </div>
</div>
